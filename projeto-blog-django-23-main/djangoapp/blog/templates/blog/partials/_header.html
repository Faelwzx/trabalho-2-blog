{% load static %}

<header class="header section-wrapper">
  <div class="section-content-wide">
    <div class="section-gap">
      
      <div class="ceara-banner center pb-base">
        <img
          class="ceara-logo"
          src="{% static 'blog/img/ceara-logo.png' %}"
          alt="Ceará Sporting Club"
        >
      </div>

      <h1 class="blog-title center pb-base">
        <a class="blog-link" href="/">Vozão News</a>
      </h1>

      <h1 class="blog-title center pb-base">
        <a class="blog-link" href="/">Vozão News</a>
      </h1>

      <p class="blog-description pb-base center">
        Notícias, jogos e curiosidades do Ceará Sporting Club
      </p>

      {% if site_setup.show_search %}
        <div class="search pb-base center">
          <form class="search-form" action="{% url 'blog:search' %}" method="get">
            <div class="search-content">
              <label class="sr-only" id="search-label" for="search-input">Search</label>
              <input
                class="search-input"
                type="search"
                name="search"
                id="search-input"
                placeholder="Pesquisar notícias"
                value="{{ search_value }}"
                required
              >
              <button class="search-btn" type="submit" aria-labelledby="search-label">
                <i class="fa fa-search"></i>
              </button>
            </div>
          </form>
        </div>
      {% endif %}

      <nav class="menu">
        <ul class="menu-items">
          <li class="menu-item">
            <a class="menu-link" href="/">Início</a>
          </li>
          <li class="menu-item">
            <a class="menu-link" href="/">Elenco</a>
          </li>
          <li class="menu-item">
            <a class="menu-link" href="/">Jogos</a>
          </li>
          <li class="menu-item">
            <a class="menu-link" href="/">História</a>
          </li>
        </ul>
      </nav>

    </div>
  </div>
</header>
